<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Futsal - Albi SVE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }
  #gameWrapper {
    position: relative;
    border: 4px solid #ffcc00;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(255,204,0,0.3), 0 0 60px rgba(255,204,0,0.1), inset 0 0 30px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  canvas { display: block; }
  #overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    background: rgba(10,10,26,0.75); backdrop-filter: blur(3px);
    z-index: 10; transition: opacity 0.3s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  .title {
    font-family: 'Press Start 2P', monospace; font-size: 28px; color: #ffcc00;
    text-shadow: 3px 3px 0 #b8860b, 0 0 20px rgba(255,204,0,0.5);
    margin-bottom: 10px; letter-spacing: 2px; animation: pulse 2s ease-in-out infinite;
  }
  .subtitle { font-family: 'Silkscreen', monospace; font-size: 13px; color: #88aaff; margin-bottom: 40px; opacity: 0.8; }
  .start-btn {
    font-family: 'Press Start 2P', monospace; font-size: 14px; color: #0a0a1a;
    background: #ffcc00; border: none; padding: 16px 32px; cursor: pointer; border-radius: 4px;
    box-shadow: 0 4px 0 #b8860b, 0 0 20px rgba(255,204,0,0.3); transition: all 0.1s; text-transform: uppercase;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #b8860b, 0 0 30px rgba(255,204,0,0.5); }
  .start-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b8860b; }
  .score-display { font-family: 'Press Start 2P', monospace; font-size: 18px; color: #ffcc00; margin-bottom: 8px; }
  .best-score { font-family: 'Silkscreen', monospace; font-size: 12px; color: #88aaff; margin-bottom: 30px; }
  .controls-hint { font-family: 'Silkscreen', monospace; font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 20px; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
  .game-over-title { font-family: 'Press Start 2P', monospace; font-size: 22px; color: #ff4455; text-shadow: 2px 2px 0 #880022; margin-bottom: 20px; }
</style>
</head>
<body>

<div id="gameWrapper">
  <canvas id="game"></canvas>
  <div id="overlay">

    <div class="subtitle">&#9917; Albi SVE Edition</div>
    <button class="start-btn" id="startBtn">Jouer</button>
    <div class="controls-hint">ESPACE / CLIC / TAP pour voler</div>
  </div>
</div>

let bgLoaded = false;
bgImg.onload = () => { bgLoaded = true; };

let bird, pipes, particles, score, bestScore, gameState, frameCount, groundOffset;
const GROUND_Y = H - 60;

function init() {
  bird = { x: 80, y: H / 2, vy: 0, radius: 15, rotation: 0, flapFrame: 0 };
  pipes = [];
  particles = [];
  score = 0;
  frameCount = 0;
  groundOffset = 0;
  bestScore = bestScore || 0;
}

function flap() {
  if (gameState === 'playing') {
    bird.vy = -7.5;
    bird.flapFrame = 8;
    spawnParticles(bird.x, bird.y, 3);
  }
}

function spawnParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 3,
      vy: (Math.random() - 0.5) * 3,
      life: 1,
      size: Math.random() * 3 + 1,
      color: Math.random() > 0.5 ? '#00ff88' : '#44ffaa',
    });
  }
}

function spawnPipe() {
  const gap = score >= 10 ? 135 : 150;
  const minTop = 80;
  const maxTop = GROUND_Y - gap - 60;
  const topH = Math.random() * (maxTop - minTop) + minTop;
  const moving = score >= 10;
  const moveSpeed = moving ? (1 + Math.random() * 1.5) : 0;
  const moveDir = Math.random() > 0.5 ? 1 : -1;
  pipes.push({ x: W + 10, topH, gap, width: 52, scored: false, moving, moveSpeed, moveDir });
}

function drawBackground() {
  if (bgLoaded) {
    ctx.drawImage(bgImg, 0, 0, W, H);
    // Light overlay to keep visibility but show the image clearly
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, W, H);
  } else {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a1a3e');
    grad.addColorStop(1, '#0d0d2b');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawGround() {
  const grad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  grad.addColorStop(0, '#1a5c1a');
  grad.addColorStop(1, '#0d3d0d');
  ctx.fillStyle = grad;
  ctx.fillRect(0, GROUND_Y, W, 60);

  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  groundOffset = (groundOffset + 2) % 40;
  for (let x = -groundOffset; x < W + 40; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y); ctx.lineTo(x - 20, H); ctx.stroke();
  }

  ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 3;
  ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawPipe(p) {
  const capH = 20, capExtra = 6;
  const bottomY = p.topH + p.gap;
  const topGrad = ctx.createLinearGradient(p.x, 0, p.x + p.width, 0);
  topGrad.addColorStop(0, '#117733');
  topGrad.addColorStop(0.3, '#33cc55');
  topGrad.addColorStop(0.7, '#22aa44');
  topGrad.addColorStop(1, '#117733');

  ctx.fillStyle = topGrad;
  ctx.fillRect(p.x, 0, p.width, p.topH);
  ctx.fillStyle = '#44dd66';
  ctx.fillRect(p.x - capExtra, p.topH - capH, p.width + capExtra * 2, capH);
  ctx.strokeStyle = '#117733'; ctx.lineWidth = 2;
  ctx.strokeRect(p.x - capExtra, p.topH - capH, p.width + capExtra * 2, capH);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(p.x - capExtra + 3, p.topH - capH + 3, 6, capH - 6);

  ctx.fillStyle = topGrad;
  ctx.fillRect(p.x, bottomY, p.width, GROUND_Y - bottomY);
  ctx.fillStyle = '#44dd66';
  ctx.fillRect(p.x - capExtra, bottomY, p.width + capExtra * 2, capH);
  ctx.strokeStyle = '#117733';
  ctx.strokeRect(p.x - capExtra, bottomY, p.width + capExtra * 2, capH);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(p.x - capExtra + 3, bottomY + 3, 6, capH - 6);

  if (p.moving) {
    ctx.fillStyle = 'rgba(255,68,68,0.8)';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('\u2B0D', p.x + p.width / 2, p.topH - capH - 5);
  }
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  const targetRot = Math.min(Math.max(bird.vy * 4, -30), 70);
  bird.rotation += (targetRot - bird.rotation) * 0.15;
  ctx.rotate(bird.rotation * Math.PI / 180);

  const r = bird.radius;

  // Glow - bright green
  ctx.shadowColor = '#00ff66';
  ctx.shadowBlur = 20;

  // Body - bright neon green
  ctx.fillStyle = '#00ff66';
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Darker green pentagon patches (futsal ball style)
  ctx.fillStyle = '#005522';
  [0, 72, 144, 216, 288].forEach(angle => {
    const rad = angle * Math.PI / 180;
    const px = Math.cos(rad) * r * 0.55;
    const py = Math.sin(rad) * r * 0.55;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = rad + (i * 72 * Math.PI / 180);
      const sx = px + Math.cos(a) * r * 0.22;
      const sy = py + Math.sin(a) * r * 0.22;
      i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
    }
    ctx.closePath();
    ctx.fill();
  });

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(r * 0.4, -r * 0.3, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#0a0a1a';
  ctx.beginPath();
  ctx.arc(r * 0.5, -r * 0.3, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Wing flap
  if (bird.flapFrame > 0) {
    bird.flapFrame--;
    ctx.fillStyle = '#00cc55';
    ctx.beginPath();
    ctx.ellipse(-r * 0.3, -r * 0.2 - bird.flapFrame * 1.5, r * 0.7, r * 0.3, -0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  // Outline
  ctx.strokeStyle = '#003311';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.stroke();

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawScore() {
  if (gameState !== 'playing') return;
  ctx.save();
  ctx.font = '32px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillText(score, W / 2 + 2, 52);
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(255,204,0,0.5)';
  ctx.shadowBlur = 10;
  ctx.fillText(score, W / 2, 50);
  ctx.restore();

  if (score >= 10 && score <= 12) {
    ctx.save();
    ctx.font = '10px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,136,68,' + (0.5 + Math.sin(Date.now() / 200) * 0.5) + ')';
    ctx.fillText('OBSTACLES MOBILES !', W / 2, 80);
    ctx.restore();
  }
}

function drawFlash() {
  if (gameState === 'dead' && frameCount < 5) {
    ctx.fillStyle = 'rgba(255,255,255,' + (0.6 - frameCount * 0.12) + ')';
    ctx.fillRect(0, 0, W, H);
  }
}

function checkCollision() {
  const r = bird.radius - 2;
  if (bird.y + r > GROUND_Y || bird.y - r < 0) return true;
  for (const p of pipes) {
    const bottomY = p.topH + p.gap;
    if (bird.x + r > p.x && bird.x - r < p.x + p.width) {
      if (bird.y - r < p.topH || bird.y + r > bottomY) return true;
    }
  }
  return false;
}

function update() {
  if (gameState !== 'playing') return;
  frameCount++;

  bird.vy += 0.38;
  bird.y += bird.vy;

  if (frameCount % 90 === 0) spawnPipe();

  const pipeSpeed = score >= 10 ? 3 : 2.5;

  pipes.forEach(p => {
    p.x -= pipeSpeed;
    if (p.moving) {
      p.topH += p.moveSpeed * p.moveDir;
      const minTop = 60;
      const maxTop = GROUND_Y - p.gap - 40;
      if (p.topH <= minTop) { p.topH = minTop; p.moveDir = 1; }
      if (p.topH >= maxTop) { p.topH = maxTop; p.moveDir = -1; }
    }
    if (!p.scored && p.x + p.width < bird.x) {
      p.scored = true;
      score++;
      spawnParticles(bird.x, bird.y, 5);
    }
  });

  pipes = pipes.filter(p => p.x + p.width > -10);

  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; });
  particles = particles.filter(p => p.life > 0);

  if (checkCollision()) {
    gameState = 'dead';
    frameCount = 0;
    if (score > bestScore) bestScore = score;
    spawnParticles(bird.x, bird.y, 15);
    setTimeout(showGameOver, 600);
  }
}

function render() {
  drawBackground();
  pipes.forEach(drawPipe);
  drawGround();
  drawBird();
  drawParticles();
  drawScore();
  drawFlash();
}

function gameLoop() {
  if (gameState === 'playing' || gameState === 'dead') {
    update();
    render();
    if (gameState === 'dead') frameCount++;
  }
  requestAnimationFrame(gameLoop);
}

function showGameOver() {
  overlay.classList.remove('hidden');
  overlay.innerHTML =
    '<div class="game-over-title">GAME OVER</div>' +
    '<div class="score-display">Score: ' + score + '</div>' +
    '<div class="best-score">Meilleur: ' + bestScore + '</div>' +
    '<button class="start-btn" onclick="startGame()">Rejouer</button>' +
    '<div class="controls-hint">ESPACE / CLIC / TAP pour voler</div>';
}

function startGame() {
  init();
  gameState = 'playing';
  overlay.classList.add('hidden');
}

startBtn.addEventListener('click', startGame);
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (gameState === 'playing') flap();
    else if (gameState === 'dead' && frameCount > 30) startGame();
  }
});
canvas.addEventListener('click', () => { if (gameState === 'playing') flap(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); if (gameState === 'playing') flap(); }, { passive: false });

bestScore = 0;
gameState = 'menu';
init();

function menuLoop() {
  if (gameState === 'menu') {
    drawBackground();
    drawGround();
    requestAnimationFrame(menuLoop);
  }
}
menuLoop();
gameLoop();
</script>
